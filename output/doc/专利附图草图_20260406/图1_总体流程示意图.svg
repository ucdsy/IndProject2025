<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1900" viewBox="0 0 1400 1900">
  <defs>
    <style>
      .title { font: 700 34px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #000; }
      .label { font: 600 22px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #000; }
      .text { font: 20px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #000; }
      .small { font: 18px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #000; }
      .box { fill: #fff; stroke: #000; stroke-width: 2.5; rx: 18; ry: 18; }
      .note { fill: #fff; stroke: #000; stroke-width: 2; stroke-dasharray: 10 8; rx: 16; ry: 16; }
      .line { stroke: #000; stroke-width: 2.5; fill: none; }
    </style>
    <marker id="arrow1" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
  </defs>

  <text x="700" y="60" text-anchor="middle" class="title">图1 总体流程示意图</text>

  <rect x="140" y="110" width="1120" height="1640" class="note"/>
  <text x="700" y="150" text-anchor="middle" class="label">面向智能体语义寻址与执行发现的受约束多阶段路由决策流程</text>

  <rect x="460" y="190" width="480" height="90" class="box"/>
  <text x="700" y="225" text-anchor="middle" class="label">S101 接收用户请求</text>
  <text x="700" y="255" text-anchor="middle" class="small">自然语言查询信息 / 上下文信息 / 约束信息 / 智能体注册快照</text>

  <line x1="700" y1="280" x2="700" y2="340" class="line" marker-end="url(#arrow1)"/>

  <rect x="390" y="340" width="620" height="110" class="box"/>
  <text x="700" y="380" text-anchor="middle" class="label">S102 执行召回处理</text>
  <text x="700" y="410" text-anchor="middle" class="small">基于预设命名空间描述信息生成语义能力地址候选集合</text>

  <line x1="700" y1="450" x2="700" y2="510" class="line" marker-end="url(#arrow1)"/>

  <rect x="390" y="510" width="620" height="110" class="box"/>
  <text x="700" y="550" text-anchor="middle" class="label">S103 执行快路径裁决</text>
  <text x="700" y="580" text-anchor="middle" class="small">输出初始主能力地址、初始相关能力地址、裁决置信度、候选竞争差值</text>

  <line x1="700" y1="620" x2="700" y2="690" class="line" marker-end="url(#arrow1)"/>

  <polygon points="700,690 910,790 700,890 490,790" fill="#fff" stroke="#000" stroke-width="2.5"/>
  <text x="700" y="780" text-anchor="middle" class="label">S104 是否满足</text>
  <text x="700" y="810" text-anchor="middle" class="label">慢路径触发条件</text>

  <text x="955" y="780" class="label">否</text>
  <line x1="910" y1="790" x2="1140" y2="790" class="line" marker-end="url(#arrow1)"/>
  <rect x="1080" y="690" width="180" height="200" class="box"/>
  <text x="1170" y="740" text-anchor="middle" class="label">维持快路径</text>
  <text x="1170" y="775" text-anchor="middle" class="small">直接进入</text>
  <text x="1170" y="805" text-anchor="middle" class="small">实例筛选排序</text>

  <text x="445" y="780" class="label">是</text>
  <line x1="490" y1="790" x2="290" y2="790" class="line" marker-end="url(#arrow1)"/>
  <rect x="170" y="700" width="230" height="180" class="box"/>
  <text x="285" y="750" text-anchor="middle" class="label">S105 异质共识处理</text>
  <text x="285" y="785" text-anchor="middle" class="small">仅在候选集合内</text>
  <text x="285" y="815" text-anchor="middle" class="small">进行候选内复核</text>

  <line x1="285" y1="880" x2="285" y2="980" class="line" marker-end="url(#arrow1)"/>
  <rect x="170" y="980" width="230" height="180" class="box"/>
  <text x="285" y="1030" text-anchor="middle" class="label">S106 覆盖控制步骤</text>
  <text x="285" y="1065" text-anchor="middle" class="small">票数门限 / 得分增益</text>
  <text x="285" y="1095" text-anchor="middle" class="small">显式证据 / 责任角色确认</text>

  <line x1="400" y1="1070" x2="700" y2="1070" class="line" marker-end="url(#arrow1)"/>

  <rect x="460" y="1010" width="480" height="120" class="box"/>
  <text x="700" y="1050" text-anchor="middle" class="label">确定最终主能力地址与最终相关能力地址</text>
  <text x="700" y="1085" text-anchor="middle" class="small">允许覆盖时改判；不允许覆盖时维持初始主能力地址</text>

  <line x1="1170" y1="890" x2="1170" y2="1070" class="line"/>
  <line x1="1170" y1="1070" x2="940" y2="1070" class="line" marker-end="url(#arrow1)"/>

  <line x1="700" y1="1130" x2="700" y2="1200" class="line" marker-end="url(#arrow1)"/>

  <rect x="390" y="1200" width="620" height="105" class="box"/>
  <text x="700" y="1240" text-anchor="middle" class="label">S107 筛选智能体实例地址候选集合</text>
  <text x="700" y="1270" text-anchor="middle" class="small">从智能体注册快照中筛选与最终主能力地址精确对应的实例</text>

  <line x1="700" y1="1305" x2="700" y2="1375" class="line" marker-end="url(#arrow1)"/>

  <rect x="390" y="1375" width="620" height="105" class="box"/>
  <text x="700" y="1415" text-anchor="middle" class="label">S108 过滤与排序</text>
  <text x="700" y="1445" text-anchor="middle" class="small">过滤无效实例并基于匹配度、健康度、公平度生成排序结果</text>

  <line x1="700" y1="1480" x2="700" y2="1550" class="line" marker-end="url(#arrow1)"/>

  <rect x="390" y="1550" width="620" height="115" class="box"/>
  <text x="700" y="1590" text-anchor="middle" class="label">S109 输出结果</text>
  <text x="700" y="1620" text-anchor="middle" class="small">最终主能力地址 / 最终相关能力地址 / 目标智能体实例地址 / 调用端点</text>
  <text x="700" y="1650" text-anchor="middle" class="small">结构化决策轨迹</text>

  <rect x="1020" y="1185" width="180" height="315" class="note"/>
  <text x="1110" y="1230" text-anchor="middle" class="label">能力层</text>
  <line x1="1110" y1="1245" x2="1110" y2="1325" class="line"/>
  <text x="1110" y="1360" text-anchor="middle" class="small">能力地址候选召回</text>
  <text x="1110" y="1390" text-anchor="middle" class="small">快路径裁决</text>
  <text x="1110" y="1420" text-anchor="middle" class="small">慢路径共识</text>
  <text x="1110" y="1450" text-anchor="middle" class="small">覆盖控制</text>

  <rect x="1020" y="1515" width="180" height="150" class="note"/>
  <text x="1110" y="1560" text-anchor="middle" class="label">实例层</text>
  <line x1="1110" y1="1575" x2="1110" y2="1610" class="line"/>
  <text x="1110" y="1640" text-anchor="middle" class="small">实例过滤</text>
  <text x="1110" y="1670" text-anchor="middle" class="small">实例排序</text>

  <rect x="180" y="1200" width="150" height="290" class="note"/>
  <text x="255" y="1240" text-anchor="middle" class="label">候选边界</text>
  <text x="255" y="1280" text-anchor="middle" class="small">异质共识</text>
  <text x="255" y="1310" text-anchor="middle" class="small">不生成</text>
  <text x="255" y="1340" text-anchor="middle" class="small">候选集合外</text>
  <text x="255" y="1370" text-anchor="middle" class="small">的新语义</text>
  <text x="255" y="1400" text-anchor="middle" class="small">能力地址</text>
</svg>
