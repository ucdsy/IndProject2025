<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1500" viewBox="0 0 1500 1500">
  <defs>
    <style>
      .title { font: 700 34px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #000; }
      .label { font: 600 22px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #000; }
      .text { font: 20px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #000; }
      .small { font: 18px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #000; }
      .box { fill: #fff; stroke: #000; stroke-width: 2.5; rx: 18; ry: 18; }
      .frame { fill: #fff; stroke: #000; stroke-width: 2.2; stroke-dasharray: 12 8; rx: 22; ry: 22; }
      .line { stroke: #000; stroke-width: 2.5; fill: none; }
    </style>
    <marker id="arrow5" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
  </defs>

  <text x="750" y="60" text-anchor="middle" class="title">图5 结构化决策轨迹的数据组织示意图</text>

  <rect x="130" y="110" width="1240" height="1280" class="frame"/>
  <text x="750" y="150" text-anchor="middle" class="label">结构化决策轨迹对象</text>

  <rect x="240" y="220" width="1020" height="180" class="box"/>
  <text x="750" y="265" text-anchor="middle" class="label">召回阶段字段组</text>
  <text x="750" y="305" text-anchor="middle" class="small">语义能力地址候选集合</text>
  <text x="750" y="335" text-anchor="middle" class="small">候选相关度</text>
  <text x="750" y="365" text-anchor="middle" class="small">混淆源标记</text>

  <rect x="240" y="450" width="1020" height="210" class="box"/>
  <text x="750" y="495" text-anchor="middle" class="label">快路径阶段字段组</text>
  <text x="750" y="535" text-anchor="middle" class="small">初始主能力地址</text>
  <text x="750" y="565" text-anchor="middle" class="small">初始相关能力地址</text>
  <text x="750" y="595" text-anchor="middle" class="small">裁决置信度</text>
  <text x="750" y="625" text-anchor="middle" class="small">候选竞争差值 / 慢路径触发原因</text>

  <rect x="240" y="710" width="1020" height="250" class="box"/>
  <text x="750" y="755" text-anchor="middle" class="label">慢路径阶段字段组</text>
  <text x="750" y="795" text-anchor="middle" class="small">语义交接信息</text>
  <text x="750" y="825" text-anchor="middle" class="small">角色提案</text>
  <text x="750" y="855" text-anchor="middle" class="small">角色信号</text>
  <text x="750" y="885" text-anchor="middle" class="small">聚合结果</text>
  <text x="750" y="915" text-anchor="middle" class="small">覆盖阻断原因</text>

  <rect x="240" y="1010" width="1020" height="220" class="box"/>
  <text x="750" y="1055" text-anchor="middle" class="label">实例选择阶段字段组</text>
  <text x="750" y="1095" text-anchor="middle" class="small">实例过滤原因</text>
  <text x="750" y="1125" text-anchor="middle" class="small">实例匹配度 / 健康度</text>
  <text x="750" y="1155" text-anchor="middle" class="small">实例曝光公平度 / 提供方曝光公平度</text>
  <text x="750" y="1185" text-anchor="middle" class="small">最终排序得分</text>

  <rect x="240" y="1280" width="1020" height="80" class="box"/>
  <text x="750" y="1330" text-anchor="middle" class="label">输出阶段字段组：最终主能力地址 / 最终相关能力地址 / 目标智能体实例地址 / 调用端点</text>

  <line x1="750" y1="400" x2="750" y2="450" class="line" marker-end="url(#arrow5)"/>
  <line x1="750" y1="660" x2="750" y2="710" class="line" marker-end="url(#arrow5)"/>
  <line x1="750" y1="960" x2="750" y2="1010" class="line" marker-end="url(#arrow5)"/>
  <line x1="750" y1="1230" x2="750" y2="1280" class="line" marker-end="url(#arrow5)"/>

  <text x="1310" y="285" text-anchor="middle" class="small">可用于判断</text>
  <text x="1310" y="315" text-anchor="middle" class="small">是否在召回阶段</text>
  <text x="1310" y="345" text-anchor="middle" class="small">已经发生偏差</text>

  <text x="1310" y="560" text-anchor="middle" class="small">可用于判断</text>
  <text x="1310" y="590" text-anchor="middle" class="small">快路径为何</text>
  <text x="1310" y="620" text-anchor="middle" class="small">触发慢路径</text>

  <text x="1310" y="830" text-anchor="middle" class="small">可用于判断</text>
  <text x="1310" y="860" text-anchor="middle" class="small">覆盖为何发生</text>
  <text x="1310" y="890" text-anchor="middle" class="small">或为何被阻断</text>

  <text x="1310" y="1105" text-anchor="middle" class="small">可用于判断</text>
  <text x="1310" y="1135" text-anchor="middle" class="small">某实例为何被过滤</text>
  <text x="1310" y="1165" text-anchor="middle" class="small">或最终胜出</text>
</svg>
